---
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  VERSION_MAJOR: "0"
  VERSION_MINOR: "1"

jobs:
  changes:
    name: Detect changes
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.filter.outputs.go }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Path filter
        id: filter
        uses: dorny/paths-filter@782470c5d953cae2693d643172b14e01bacb71f3 # v3.0.3
        with:
          token: ""
          base: main
          filters: |
            go:
              - keycloak/**
              - cmd/**
              - go.mod
              - go.sum
            docker:
              - Dockerfile
              - .dockerignore
              - .github/workflows/ci-cd.yml
              - keycloak/**

  test:
    name: Test
    needs: changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (needs.changes.result == 'success' && needs.changes.outputs.go == 'true')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Run tests
        run: go test -count=1 -race ./...

  docker:
    name: Docker image
    needs: [changes, test]
    if: >-
      always() &&
      (needs.test.result == 'success' || needs.test.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (needs.changes.result == 'success' && needs.changes.outputs.docker == 'true')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build number
        id: build_number
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: onyxmueller/build-tag-number@a0792399755057a06c7805cae3299807cbaf0035 # v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          prefix: glauth-keycloak

      - name: Set version
        id: version
        env:
          BUILD_NUMBER: ${{ steps.build_number.outputs.build_number }}
        run: |
          major="${{ env.VERSION_MAJOR }}"
          minor="${{ env.VERSION_MINOR }}"
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            version="${major}.${minor}.${BUILD_NUMBER}"
          else
            version="${major}.${minor}.${{ github.run_number }}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "glauth-keycloak version: ${version}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to container registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.6.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: meta
        env:
          VERSION_TAG: ${{ steps.version.outputs.version }}
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          image="${{ env.REGISTRY }}/${repo}"
          {
            echo "tags<<EOF"
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              echo "${image}:pr-${{ github.event.pull_request.number }}"
            else
              echo "${image}:${VERSION_TAG}"
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing tags for ${image}:"
          sed -n '/^tags<<EOF$/,/^EOF$/p' "$GITHUB_OUTPUT" | sed '1d;$d'

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.18.0
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          sbom: false
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.title=glauth-keycloak
          cache-from: type=gha,scope=glauth-keycloak
          cache-to: type=gha,mode=max,scope=glauth-keycloak

      - name: Summary
        if: github.event_name != 'pull_request'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          repo=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          image="${{ env.REGISTRY }}/${repo}"
          echo "- \`${image}:${VERSION}\` (+ \`latest\`)" >> "$GITHUB_STEP_SUMMARY"